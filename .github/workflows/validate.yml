name: Validate archive

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate data/*.json against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli@5

      - name: Validate data/nvc.json
        run: ajv validate -s data/nvc.schema.json -d data/nvc.json

      - name: Validate data/outcomes.json
        run: ajv validate -s data/outcomes.schema.json -d data/outcomes.json

      - name: Validate data/teams.json
        run: ajv validate -s data/teams.schema.json -d data/teams.json

  no-em-dash:
    name: Enforce no-em-dash style rule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Search for em dash characters in markdown and JSON
        run: |
          set -e
          # U+2014 EM DASH; allowed nowhere in the archive per the project style rule.
          if grep -rn $'\xe2\x80\x94' --include='*.md' --include='*.json' .; then
            echo ""
            echo "Em dash characters (U+2014) found in the files listed above."
            echo "Replace with a hyphen-minus, comma, period, colon, or rephrase."
            echo "See feedback memory: the archive deliberately does not use em dashes."
            exit 1
          fi
          echo "No em dash characters found."
